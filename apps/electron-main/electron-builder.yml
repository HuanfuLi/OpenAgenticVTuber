appId: com.agenticllmvtuber.app
productName: AgenticLLMVTuber
directories:
  buildResources: build
  output: ../../dist
files:
  - out/**/*
  - ../renderer/out/**/*
  - package.json
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  artifactName: ${productName}-${version}-${arch}-Setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: generic
  url: https://example.com/auto-update
