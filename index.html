<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgenticLLMVTuber — Phase 1 Prototype</title>
    <link rel="stylesheet" href="src/index.css" />

    <div id="root"></div>

    <!-- React 18 + Babel (pinned) -->

    <script type="text/babel" src="src/views/SettingsView.jsx"></script>
