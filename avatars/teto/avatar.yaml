# Teto rig capabilities — names must match what VTS Settings shows so the LLM's
# bracket emissions actually trigger the right expressions. The forward-compat
# lie comment that used to live here is removed because Phase 2 SC #2 was
# verified live with these names: 2026-05-07.
#
# Phase 4's pyvts smoke-pass will be able to introspect VTS for the
# authoritative list; until then this file is hand-curated from VTS Settings →
# Expressions panel.

expressions:
  # Required by the Phase 4 headline demo: the system prompt teaches the LLM
  # to emit [joy], and actions_extractor only emits intents for names listed
  # here. Love is the closest existing Teto expression asset for that alias.
  - name: joy
    file: Love.exp3.json
  - name: Blush
    file: Blush.exp3.json
  - name: chibi
    file: chibi.exp3.json
  - name: Cry
    file: Cry.exp3.json
  - name: Dark Eye
    file: Dark Eye.exp3.json
  - name: Dark Face
    file: Dark Face.exp3.json
  - name: Dizzy
    file: Dizzy.exp3.json
  - name: Exp eye
    file: Exp eye.exp3.json
  - name: Love
    file: Love.exp3.json
  - name: Star Eye
    file: Star Eye.exp3.json
  - name: Sweat
    file: Sweat.exp3.json
  - name: "【SV】Baguette"
    file: "【SV】Baguette.exp3.json"
  - name: "【SV】Mic"
    file: "【SV】Mic.exp3.json"
  - name: "【Utau】Mic"
    file: "【Utau】Mic.exp3.json"
  - name: SV Utau ALT
    file: SV Utau ALT.exp3.json
  # Excluded: "Remove Water Mark" (meta/admin — never something the LLM should
  # trigger via [tag] emission). Phase 4 introspection will need a per-item
  # llm_emittable flag (or curated allowlist) to filter VTS-discovered items
  # like this automatically.

hotkeys: []  # populate when you add VTS hotkeys (animations, transforms, etc.)
             # — none discovered for the Teto rig at the time of this curation.

parameters:
  - id: ParamMouthOpenY
  - id: ParamAngleX
  - id: ParamAngleY
  - id: ParamAngleZ
  - id: ParamBodyAngleX
  - id: ParamBodyAngleY
  - id: ParamBodyAngleZ
  - id: ParamEyeLOpen
  - id: ParamEyeROpen

voice:
  backend: piper
  model: en_US-amy-medium
  lipsync_mode: our-rms
